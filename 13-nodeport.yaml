kind: Service
apiVersion: v1

metadata:
  name: nginx

spec:
  type: NodePort
  selector: # here ABLES ARE USED AS SELECETORS
    project: expense
    component: backend
    environment: dev
    version: "1.0.0"

  ports:
  - protocol: TCP
    port: 80
    targetPort: 80

---
kind: Pod
apiVersion: v1

metadata:
  name: labels
  labels: 
    project: expense
    component: backend
    environment: dev

spec:
  containers:
  - name: nginx
    image: nginx    